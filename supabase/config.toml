# Configuration Supabase CLI (local).
# `supabase start` lance Postgres + PostgREST + Auth + Storage en local.
project_id = "ta-jiro-rano"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[storage]
enabled = true
file_size_limit = "5MiB"

[auth]
enabled = true
site_url = "http://localhost:4200"
additional_redirect_urls = ["http://localhost:4200"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false  # local : pas de confirmation e-mail

# Google OAuth : renseigner via variables d'env en prod (cf. README).
[auth.external.google]
enabled = false
client_id = ""
secret = ""
